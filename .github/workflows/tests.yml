name: tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.14
      - run: uv sync --dev
      - run: uv run deptry .
      - run: uv run ruff check .
      - run: uv run pytest
